<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>SB Stocks | Register</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-card">
      <h1>Create your account</h1>
      <p class="sub">Get $100,000 in virtual funds to start paper trading</p>

      <form id="registerForm">
        <label>Full Name</label>
        <input type="text" id="name" placeholder="Jane Doe" required />

        <label>Email</label>
        <input type="email" id="email" placeholder="you@example.com" required />

        <label>Password</label>
        <input type="password" id="password" placeholder="min 6 characters" required />

        <button type="submit" class="btn">Sign Up</button>
      </form>

      <p class="switch-link">Already have an account? <a href="index.html">Log in</a></p>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    document.getElementById("registerForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const name = document.getElementById("name").value;
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      try {
        const data = await api("/api/auth/register", "POST", { name, email, password });
        localStorage.setItem("sb_token", data.token);
        window.location.href = "dashboard.html";
      } catch (err) {
        alert(err.message);
      }
    });
  </script>
</body>
</html>
